<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40" role="img" aria-label="HireIQ logo">
  <title>HireIQ</title>

  <!-- Icon: slightly lighter rounded square to stand out on dark sidebar -->
  <rect x="0" y="0" width="40" height="40" rx="9" fill="#2563eb"/>

  <!-- Person silhouette -->
  <circle cx="20" cy="13" r="5" fill="white" opacity="0.95"/>
  <path d="M11 28 Q11 21 20 21 Q29 21 29 28" fill="white" opacity="0.95"/>

  <!-- Lightning bolt badge -->
  <circle cx="31" cy="31" r="8" fill="white" opacity="0.15"/>
  <polyline points="33,25.5 29.5,31 32,31 29,36.5" stroke="white" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark in white for dark backgrounds -->
  <text x="50" y="26" font-family="'Segoe UI', ui-sans-serif, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="-0.5">Hire<tspan fill="#60a5fa">IQ</tspan></text>
</svg>
